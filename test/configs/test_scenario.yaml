name: test-scenario
version: 1.0
sequence:
  iterations: 100
  time_limit: 1m
  abort_on_error: true
  ignore_duplicate_errors: true
  requests:
    - name: request1
      method: get
      scheme: https
      path: some_path
      host: host
      time_limit: 1m
      username: bob-ross
      password: happy-little-trees
      fragment: frag
      query:
        key: value
        key2: value2
      extra_headers:
        - name: Foo
          value: bar
        - name: Goo
          value: moo
      content: some-content
      content_type: text
      response:
        content:
          type: json
          contains:
            - "foo"
            - "bar*"
          extract:
            - path: goo.moo.boo
              save_as: foo
            - path: boo.hoo
              save_as: foo2
        expected_status:
          - 200
          - 401
          - 203
    - name: request2
      method: put
      scheme: http
      path: different_path
      host: host2
      time_limit: 1m
      username: bob-ross
      password: happy-little-trees
      fragment: frag
      query:
        key: value
        key2: value2
      extra_headers:
        - name: Foo
          value: bar
        - name: Goo
          value: moo
      content: some-content
      content_type: text
      response:
        content:
          type: json
          contains:
            - "foo"
            - "bar*"
          extract:
            - path: hoo.koo.boo
              save_as: foo3
            - path: boo.hoo
              save_as: foo4
        expected_status:
          - 500
