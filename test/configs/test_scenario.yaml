name: test-scenario
version: 1.0
sequence:
  iterations: 1
  time_limit: 1m
  abort_on_error: true
  ignore_duplicate_errors: true
  requests:
    - name: name_of_request
      scheme: https
      path: some path
      host: host
      time_limit: 1m
      query:
        key: value
        key2: value2
      extra_headers:
        header1: header_value
        header2: header2_value
        header3: $save_name
      content: some-content
      content_type: text
      response:
        content:
          type: json
          contains:
            - "foo"
            - "bar*"
          extract: goo.moo.boo
          save_as: foo
        expected_status:
          - 200
          - 401
          - 203
