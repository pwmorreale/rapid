name: test-scenario
version: 1.0
sequence:
  iterations: 10
  time_limit: 1m
  abort_on_error: true
  ignore_duplicate_errors: true
  requests:
    - name: request1
      time_limit: 1m
      method: post
      url: https://bob.ross.com/happy_little_trees
      extra_headers:
        - name: X-Paintbrush-for-sky
          value: wide
        - name: X-Paintbrush-for-trees
          value: narrow
      content: "various paint colors"
      content_type: text
      response:
        content:
          type: json
          contains:
            - "foo"
            - "bar*"
          extract:
            - type: regex
              path: goo.moo.boo
              save_as: foo
            - type: json
              path: boo.hoo
              save_as: foo2
        expected_status:
          - 200
    - name: request2
      time_limit: 1m
      method: get
      url: https://www.washingtonpost.com/articles
      response:
        content:
          type: xml
          contains:
            - opinions
            - todays.news.stories
          extract:
            - path: todays.headlines
              save_as: headlines
        expected_status:
          - 200
